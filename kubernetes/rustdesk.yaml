apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustdesk-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustdesk
  template:
    metadata:
      labels:
        app: rustdesk
    spec:
      containers:
      - name: hbbs
        image: rustdesk/rustdesk-server:latest
        command: ["hbbs"]
        ports:
        - containerPort: 21115
        - containerPort: 21116
        - containerPort: 21118

      - name: hbbr
        image: rustdesk/rustdesk-server:latest
        command: ["hbbr"]
        ports:
        - containerPort: 21117
        - containerPort: 21119
---
apiVersion: v1
kind: Service
metadata:
  name: rustdesk-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: rustdesk
  ports:
  - name: hbbs-tcp
    port: 21116
    targetPort: 21116
    nodePort: 31116
  - name: hbbr-tcp
    port: 21117
    targetPort: 21117
    nodePort: 31117
